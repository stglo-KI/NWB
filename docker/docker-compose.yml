version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nahwaerme-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: nahwaerme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nahwaerme-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-change-me-in-production}@db:5432/nahwaerme
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret-in-production}
      N8N_API_KEY: ${N8N_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nextjs_cache:/app/.next

volumes:
  postgres_data:
  nextjs_cache:

networks:
  default:
    name: nahwaerme-network
